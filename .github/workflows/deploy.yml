name: Deploy API (hal-noticias-api)

on:
  push:
    branches: [main]
  # Corre los tests en pull requests para frenar regresiones antes del merge.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-noticias-api
  cancel-in-progress: false

env:
  # Ruta del dominio relativa al home (acceso SFTP-only)
  REMOTE_DOMAIN_DIR: web/noticias.hospitalantoniolorena.gob.pe
  REMOTE_PRIVATE_DIR: web/noticias.hospitalantoniolorena.gob.pe/private
  BASE_URL: https://www.noticias.hospitalantoniolorena.gob.pe

jobs:
  # Ejecuta los tests (PHPUnit) antes de desplegar. El job de deploy depende de
  # este, asi un test fallido bloquea el deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: pdo, pdo_mysql, mbstring, zip

      - name: Instalar dependencias (con dev)
        run: composer install --no-interaction --prefer-dist

      - name: Ejecutar tests
        run: composer test

  deploy:
    needs: test
    # Solo despliega en push a main / ejecucion manual, nunca en pull requests.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: pdo, pdo_mysql, mbstring, zip

      - name: Instalar dependencias (producción)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Crear .env para producción
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          cat > .env << 'EOF'
          APP_BASE_PATH=/api
          AUTH_ENABLED=true
          JWT_SECRET=${JWT_SECRET}
          JWT_TTL=28800
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASS=${DB_PASS}
          CORS_ORIGINS=https://noticias.hospitalantoniolorena.gob.pe
          MAILER_HOST=localhost
          MAILER_PORT=25
          MAILER_FROM=noticias@hospitalantoniolorena.gob.pe
          MAILER_FROM_NAME=Sistema de Noticias
          AUTH_2FA_DEV=false
          APP_DEBUG=false
          APP_SECURE=true
          EOF

      - name: Preparar artefacto (zip + extractor)
        run: |
          set -euo pipefail
          mkdir -p stage/api
          cp -r src public vendor composer.json composer.lock sql scripts .env stage/api/
          ( cd stage/api && zip -qr "$GITHUB_WORKSPACE/payload.zip" . )
          ls -lh payload.zip

      - name: Extraer payload localmente
        run: |
          set -euo pipefail
          mkdir -p api-extracted
          unzip -q payload.zip -d api-extracted
          ls -la api-extracted

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Desplegar API por SFTP
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          KEY="$HOME/.ssh/id_deploy"
          SSH="ssh -a -x -i $KEY -p $DEPLOY_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          lftp -e "
            set sftp:connect-program '$SSH';
            set sftp:auto-confirm yes;
            set net:max-retries 5;
            set net:persist-retries 10;
            set net:timeout 30;
            set xfer:clobber on;
            set mirror:parallel-transfer-count 1;
            open -u $DEPLOY_USER, sftp://$DEPLOY_HOST;
            mkdir -p -f $REMOTE_PRIVATE_DIR;
            mirror -R --delete --no-perms --verbose ./api-extracted/ $REMOTE_PRIVATE_DIR;
            bye
          "
          echo "✅ Deployment completed"
